name: Deploy to Development

on:
  push:
    branches:
      - develop

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 16

      - name: Install dependencies
        run: npm install

      - name: Build website
        run: npx parcel build index.html blog.html contact.html --public-url . --no-cache

      - name: Debug: List build files
        run: ls -l dist || echo "dist folder is missing!"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: dist

     deploy:
    runs-on: ubuntu-latest
    needs: build
    environment: 
      name: github-pages
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: build-artifact
          path: dist

      - name: Debug: List downloaded files
        run: ls -l dist || echo "dist folder is missing after download!"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v3  # Ensures GitHub Pages is properly set up

      - name: Upload artifact for deployment
        uses: actions/upload-pages-artifact@v1  # Uploads the built site for deployment
        with:
          path: dist

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v2  # Deploys to GitHub Pages

