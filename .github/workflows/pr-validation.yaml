name: PR Validation

on:
  pull_request:
    branches:
      - develop

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install dependencies
        run: npm install

      - name: Lint HTML
        run: npx htmlhint src/**/*.html

      - name: Lint CSS
        run: npx stylelint styles/**/*.css

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install dependencies
        run: npm install

      - name: Build website
        run: npx parcel build index.html src/blog.html src/contact.html --public-url . --no-cache


      - name: Upload artifact
        uses: actions/upload-artifact@v4  
        with:
          name: build-artifact
          path: dist
